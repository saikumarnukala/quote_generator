name: Generate & Publish Quote Video

# ─── Schedule: 1 time daily (USA late morning peak) ──────────────────────────
# Times are UTC  →  EDT = UTC−4  /  PDT = UTC−7
#   15:00 UTC = 11:00 AM EDT / 8:00 AM PDT  → USA late morning
on:
  schedule:
    - cron: '0 15 * * *'   # 11:00 AM EDT / 8:00 AM PDT
  workflow_dispatch:       # also allow manual trigger from GitHub UI
    inputs:
      topic:
        description: 'Custom quote theme (leave empty for auto)'
        required: false
        default: ''
      scenes:
        description: 'Number of scenes (default: 7)'
        required: false
        default: '7'
      language:
        description: 'Language: en / te / hi / ta / ja'
        required: false
        default: 'en'

jobs:
  generate:
    name: Generate & publish video
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write   # needed to commit data/history.json back to repo

    steps:
      # ── 1. Checkout repo ───────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Set up Python ───────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. System dependencies (FFmpeg + Noto fonts for Unicode text) ──
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            fonts-noto \
            fonts-noto-cjk \
            fonts-noto-color-emoji

      # ── 4. Python dependencies ─────────────────────────────────────────
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── 5. Generate video & upload to YouTube + Instagram ─────────────
      - name: Generate and publish quote video
        env:
          GROQ_API_KEY:           ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY:         ${{ secrets.PEXELS_API_KEY }}
          JAMENDO_CLIENT_ID:      ${{ secrets.JAMENDO_CLIENT_ID }}
          PIXABAY_API_KEY:        ${{ secrets.PIXABAY_API_KEY }}
          YT_CLIENT_ID:           ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET:       ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN:       ${{ secrets.YT_REFRESH_TOKEN }}
          INSTAGRAM_USER_ID:      ${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
        run: |
          TOPIC="${{ github.event.inputs.topic }}"
          SCENES="${{ github.event.inputs.scenes || '7' }}"
          LANG="${{ github.event.inputs.language || 'en' }}"

          if [ -z "$TOPIC" ]; then
            python main.py --scenes "$SCENES" --lang "$LANG" --allow-jamendo-upload
          else
            python main.py "$TOPIC" --scenes "$SCENES" --lang "$LANG" --allow-jamendo-upload
          fi

      # ── 6. Commit updated history back to repo (so next run skips used content) ──
      - name: Commit history
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/history.json
          if git diff --cached --quiet; then
            echo "No history changes to commit."
          else
            git commit -m "chore: update run history [skip ci]"
            git pull --rebase origin main
            git push
          fi

      # ── 7. Keep video as downloadable artifact (backup) ───────────────
      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: quote-video-${{ github.run_number }}
          path: output/*.mp4
          retention-days: 14
